<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sentiment Analyzer</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; }
        .result-box { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .Positive { color: green; font-weight: bold; }
        .Negative { color: red; font-weight: bold; }
        .Neutral { color: rgb(231, 231, 7); font-weight: bold; }
    </style>
</head>
<body>
    <h2>Sentiment Analysis Tool</h2>
    <form method="POST">
        <textarea name="text_input" placeholder="Enter text here..." required></textarea><br>
        <button type="submit">Analyze Sentiment</button>
    </form>

    {% if result %}
    <div class="result-box">
        <h3>Analysis for: "{{ result.text }}"</h3>
        <p>Classification: <span class="{{ result.sentiment }}">{{ result.sentiment }}</span></p>
        <p>Polarity Score: <strong>{{ result.polarity }}</strong> (-1 to 1)</p>
        <p>Subjectivity Score: <strong>{{ result.subjectivity }}</strong> (0 to 1)</p>
    </div>
    {% endif %}
</body>
</html>
